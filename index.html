<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIVI AI | Ultra Pro Max</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --white: #ffffff;
            --bg-black: #020202;
        }

        body {
            background-color: var(--bg-black);
            background-image: 
                radial-gradient(circle at 50% 50%, #001a1d 0%, transparent 80%),
                linear-gradient(0deg, transparent 24%, rgba(0, 242, 255, .05) 25%, rgba(0, 242, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 242, 255, .05) 75%, rgba(0, 242, 255, .05) 76%, transparent 77%, transparent),
                linear-gradient(90deg, transparent 24%, rgba(0, 242, 255, .05) 25%, rgba(0, 242, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 242, 255, .05) 75%, rgba(0, 242, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            color: var(--white);
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Modern HUD Displays */
        .hud-panel {
            position: absolute;
            background: rgba(0, 242, 255, 0.05);
            border: 1px solid var(--neon-blue);
            padding: 10px 20px;
            backdrop-filter: blur(5px);
            box-shadow: 0 0 15px rgba(0, 242, 255, 0.2);
        }

        .top-left { top: 30px; left: 30px; border-left: 5px solid var(--neon-blue); }
        .top-right { top: 30px; right: 30px; border-right: 5px solid var(--neon-blue); }

        .label { font-size: 0.7rem; color: var(--neon-blue); letter-spacing: 2px; }
        .data { font-family: 'Share Tech Mono', monospace; font-size: 1.4rem; }

        /* Robotic AI Core */
        .ai-core {
            position: relative;
            width: 250px;
            height: 250px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .scanner {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            animation: scan 3s infinite ease-in-out;
            z-index: 10;
        }

        @keyframes scan { 0%, 100% { top: 0; } 50% { top: 100%; } }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
            animation: pulse 2s infinite;
        }

        .c1 { width: 100%; height: 100%; border-style: dashed; animation: rotate 20s linear infinite; }
        .c2 { width: 80%; height: 80%; border-style: double; animation: rotate 10s linear reverse infinite; }
        .inner-brain {
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, var(--neon-blue), transparent);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--neon-blue);
            z-index: 5;
        }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        @keyframes pulse { 0% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.05); opacity: 1; } 100% { transform: scale(1); opacity: 0.8; } }

        /* AI Output Box */
        .response-container {
            margin-top: 50px;
            text-align: center;
            max-width: 80%;
            height: 80px;
        }

        #mivi-text {
            color: var(--neon-blue);
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.1rem;
            text-shadow: 0 0 5px var(--neon-blue);
        }

        .user-query {
            color: rgba(255,255,255,0.5);
            font-size: 0.8rem;
            margin-bottom: 10px;
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.7rem;
            letter-spacing: 5px;
            opacity: 0.6;
        }

        /* Start Screen */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; display: flex;
            align-items: center; justify-content: center;
        }

        .init-btn {
            background: transparent; border: 1px solid var(--neon-blue);
            color: var(--neon-blue); padding: 20px 40px; font-family: 'Orbitron';
            cursor: pointer; box-shadow: 0 0 20px var(--neon-blue);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button class="init-btn" onclick="bootSystem()">BOOT MIVI AI SYSTEM</button>
    </div>

    <div class="hud-panel top-left">
        <div class="label">REGION: INDIA</div>
        <div class="data" id="time-display">00:00:00</div>
    </div>

    <div class="hud-panel top-right">
        <div class="label">CORE ENERGY</div>
        <div class="data" id="battery-display">100%</div>
    </div>

    <div class="ai-core">
        <div class="scanner"></div>
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="inner-brain" id="brain"></div>
    </div>

    <div class="response-container">
        <div class="user-query" id="user-said">Waiting for wake word "Mivi"...</div>
        <div id="mivi-text">SYSTEM SECURE</div>
    </div>

    <div class="footer">BUILT BY ARYAN AI STUDIO</div>

    <script>
        const timeEl = document.getElementById('time-display');
        const battEl = document.getElementById('battery-display');
        const userSaidEl = document.getElementById('user-said');
        const miviTextEl = document.getElementById('mivi-text');

        // Update HUD
        function updateHUD() {
            timeEl.innerText = new Intl.DateTimeFormat('en-IN', {
                timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).format(new Date());
            
            navigator.getBattery().then(b => {
                battEl.innerText = Math.floor(b.level * 100) + "%" + (b.charging ? "++" : "");
            });
        }
        setInterval(updateHUD, 1000);

        // Voice Engine
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true;
        recognition.interimResults = false;
        recognition.lang = 'en-US';

        const synth = window.speechSynthesis;

        function speak(text) {
            synth.cancel(); // Stop any current speech
            const utter = new SpeechSynthesisUtterance(text);
            utter.rate = 1.1; 
            utter.pitch = 1.0;
            synth.speak(utter);
            miviTextEl.innerText = text;
        }

        async function askAI(question) {
            miviTextEl.innerText = "THINKING...";
            try {
                // Using a fast Public Knowledge API (Wikipedia/DuckDuckGo style)
                const response = await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(question)}&format=json&no_html=1`);
                const data = await response.json();
                
                let answer = data.AbstractText;
                if (!answer) {
                    answer = "I am processing that information. Based on my database, I'll need more specifics, but I am ready to assist Aryan AI Studio.";
                }
                speak(answer);
            } catch (error) {
                speak("Connection error. I couldn't reach my cloud brain.");
            }
        }

        function bootSystem() {
            document.getElementById('overlay').style.display = 'none';
            speak("Mivi AI is online. I am listening for your command, Aryan.");
            recognition.start();
        }

        recognition.onresult = (event) => {
            const transcript = event.results[event.results.length - 1][0].transcript.toLowerCase();
            userSaidEl.innerText = `HEARD: "${transcript}"`;

            if (transcript.includes("mivi")) {
                const query = transcript.replace("mivi", "").trim();
                
                if (query === "" || query === "hello") {
                    speak("Yes Aryan, I am here. Tell me what you need.");
                } else if (query.includes("time")) {
                    speak("The time in India is " + timeEl.innerText);
                } else if (query.includes("battery")) {
                    speak("System energy is at " + battEl.innerText);
                } else {
                    // Send everything else to AI Brain
                    askAI(query);
                }
            }
        };

        // Auto Restart Recognition if it fails
        recognition.onend = () => recognition.start();
        
    </script>
</body>
</html>
