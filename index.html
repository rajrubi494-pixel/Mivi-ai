<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mivi AI - Virtual Assistant</title>
    <style>
        :root {
            --neon-blue: #00f2ff;
            --white: #ffffff;
            --bg-dark: #050505;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: var(--bg-dark);
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Top Status Bar */
        .status-bar {
            position: absolute;
            top: 20px;
            width: 90%;
            display: flex;
            justify-content: space-between;
            padding: 15px 25px;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(0, 242, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.1);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-blue);
        }

        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
        }

        /* Main AI Interface */
        .container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-weight: 200;
            letter-spacing: 8px;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .mivi-orb {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, var(--neon-blue) 0%, transparent 75%);
            border-radius: 50%;
            margin: 40px auto;
            position: relative;
            box-shadow: 0 0 40px var(--neon-blue), inset 0 0 20px var(--white);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mivi-orb:hover {
            transform: scale(1.05);
            box-shadow: 0 0 60px var(--neon-blue);
        }

        .listening {
            animation: pulse 1.2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 30px var(--neon-blue); transform: scale(1); }
            50% { box-shadow: 0 0 100px var(--neon-blue), 0 0 40px var(--white); transform: scale(1.15); }
            100% { box-shadow: 0 0 30px var(--neon-blue); transform: scale(1); }
        }

        .status-text {
            font-size: 1rem;
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        #response-text {
            margin-top: 25px;
            max-width: 450px;
            font-size: 1.1rem;
            color: var(--white);
            text-shadow: 0 0 8px var(--neon-blue);
            min-height: 50px;
            padding: 0 20px;
        }

        /* Ambient Glow Background */
        .glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--neon-blue);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="glow"></div>

    <div class="status-bar">
        <div class="stat-item">
            <span class="stat-label">India Time</span>
            <span class="stat-value" id="india-time">00:00:00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Device Battery</span>
            <span class="stat-value" id="battery-status">Loading...</span>
        </div>
    </div>

    <div class="container">
        <h1>MIVI</h1>
        <div class="mivi-orb" id="orb" onclick="startListening()"></div>
        <div class="status-text" id="mivi-status">Tap to speak to Mivi</div>
        <div id="response-text"></div>
    </div>

    <script>
        const indiaTimeEl = document.getElementById('india-time');
        const batteryEl = document.getElementById('battery-status');
        const responseText = document.getElementById('response-text');
        const miviStatus = document.getElementById('mivi-status');
        const orb = document.getElementById('orb');

        // 1. UPDATE INDIA TIME
        function updateTime() {
            const options = {
                timeZone: 'Asia/Kolkata',
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit',
                hour12: true
            };
            const formatter = new Intl.DateTimeFormat('en-IN', options);
            indiaTimeEl.innerText = formatter.format(new Date());
        }
        setInterval(updateTime, 1000);
        updateTime();

        // 2. UPDATE BATTERY STATUS
        let globalBatteryLevel = "";
        function updateBattery() {
            if (navigator.getBattery) {
                navigator.getBattery().then(battery => {
                    const level = Math.floor(battery.level * 100) + "%";
                    const charging = battery.charging ? " (Charging)" : "";
                    globalBatteryLevel = level + charging;
                    batteryEl.innerText = globalBatteryLevel;

                    battery.addEventListener('chargingchange', updateBattery);
                    battery.addEventListener('levelchange', updateBattery);
                });
            } else {
                batteryEl.innerText = "Not Supported";
            }
        }
        updateBattery();

        // 3. SPEECH ENGINE
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        const synth = window.speechSynthesis;

        recognition.onstart = () => {
            miviStatus.innerText = "Mivi is listening...";
            orb.classList.add('listening');
        };

        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript.toLowerCase();
            responseText.innerText = `You: "${transcript}"`;
            handleCommand(transcript);
        };

        recognition.onend = () => {
            miviStatus.innerText = "Tap to speak";
            orb.classList.remove('listening');
        };

        function startListening() {
            recognition.start();
        }

        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1;
            utterance.pitch = 1.1;
            synth.speak(utterance);
            miviStatus.innerText = "Mivi is responding...";
        }

        // 4. AI COMMANDS
        function handleCommand(command) {
            if (command.includes('time')) {
                const timeStr = indiaTimeEl.innerText;
                speak(`In India, the current time is ${timeStr}`);
            } 
            else if (command.includes('battery')) {
                speak(`Your device battery is at ${globalBatteryLevel}`);
            }
            else if (command.includes('hello') || command.includes('hi')) {
                speak("Hello! I am Mivi. I can tell you the time in India or check your battery. Try asking me.");
            }
            else if (command.includes('who are you')) {
                speak("I am Mivi, your neon blue AI assistant.");
            }
            else if (command.includes('open google')) {
                speak("Sure, opening Google.");
                window.open("https://www.google.com", "_blank");
            }
            else {
                speak("I heard you, but I don't have a specific command for that yet.");
            }
        }
    </script>
</body>
</html>
