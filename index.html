<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIVI | Robotic AI Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00f2ff;
            --dark-blue: #001a1d;
            --white: #ffffff;
            --robotic-grey: #1a1a1a;
        }

        body {
            background-color: #000;
            background-image: 
                linear-gradient(rgba(0, 242, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 242, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            color: var(--white);
            font-family: 'Orbitron', sans-serif;
            height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Robotic Wires and Frames */
        .ui-frame {
            position: absolute;
            border: 2px solid var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            padding: 15px;
            background: rgba(0, 0, 0, 0.8);
            clip-path: polygon(0% 0%, 90% 0%, 100% 20%, 100% 100%, 10% 100%, 0% 80%);
        }

        .top-left { top: 20px; left: 20px; border-radius: 0 0 20px 0; }
        .top-right { top: 20px; right: 20px; border-radius: 0 0 0 20px; }

        .label {
            font-size: 10px;
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .value {
            font-family: 'Share Tech Mono', monospace;
            font-size: 1.5rem;
            color: var(--white);
            text-shadow: 0 0 5px var(--white);
        }

        /* Main Core Design */
        .core-container {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .mivi-brain {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            background: radial-gradient(circle, var(--dark-blue) 20%, #000 70%);
            border: 4px double var(--neon-blue);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            box-shadow: 0 0 30px rgba(0, 242, 255, 0.2);
        }

        /* Digital Pulsing Circles */
        .ring {
            position: absolute;
            border: 1px solid var(--neon-blue);
            border-radius: 50%;
            opacity: 0.5;
            animation: rotate 10s linear infinite;
        }
        .ring-1 { width: 260px; height: 260px; border-style: dashed; }
        .ring-2 { width: 290px; height: 290px; border-width: 2px; border-bottom-color: transparent; }

        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .orb-inner {
            width: 80px;
            height: 80px;
            background: var(--neon-blue);
            border-radius: 50%;
            box-shadow: 0 0 50px var(--neon-blue), inset 0 0 20px white;
            transition: all 0.3s;
        }

        .listening .orb-inner {
            animation: glitch 0.2s infinite;
            background: #fff;
        }

        @keyframes glitch {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 80px var(--neon-blue); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            text-align: center;
            width: 100%;
        }

        .studio-name {
            font-size: 0.8rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.5);
            text-shadow: 0 0 5px var(--neon-blue);
        }

        /* Start Button overlay */
        #start-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .start-btn {
            padding: 20px 40px;
            background: transparent;
            border: 2px solid var(--neon-blue);
            color: var(--neon-blue);
            font-family: 'Orbitron';
            cursor: pointer;
            box-shadow: 0 0 20px var(--neon-blue);
        }

        .status-msg {
            margin-top: 50px;
            color: var(--neon-blue);
            font-size: 0.9rem;
            height: 20px;
        }

    </style>
</head>
<body>

    <div id="start-overlay">
        <button class="start-btn" onclick="initSystem()">INITIALIZE MIVI SYSTEM</button>
    </div>

    <!-- UI Displays -->
    <div class="ui-frame top-left">
        <div class="label">Location: India</div>
        <div class="value" id="india-time">00:00:00</div>
    </div>

    <div class="ui-frame top-right">
        <div class="label">Power Source</div>
        <div class="value" id="battery-level">---%</div>
    </div>

    <!-- Core -->
    <div class="core-container">
        <div class="ring ring-1"></div>
        <div class="ring ring-2"></div>
        <div class="mivi-brain" id="brain">
            <div class="orb-inner"></div>
        </div>
        <div class="status-msg" id="status-msg">SYSTEM STANDBY</div>
    </div>

    <div class="footer">
        <div class="studio-name">BUILT BY ARYAN AI STUDIO</div>
    </div>

    <script>
        const statusMsg = document.getElementById('status-msg');
        const brain = document.getElementById('brain');
        const timeEl = document.getElementById('india-time');
        const battEl = document.getElementById('battery-level');

        // 1. Time & Battery Logic
        function updateStats() {
            const indiaTime = new Intl.DateTimeFormat('en-IN', {
                timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
            }).format(new Date());
            timeEl.innerText = indiaTime;

            if(navigator.getBattery) {
                navigator.getBattery().then(b => {
                    battEl.innerText = Math.floor(b.level * 100) + "%" + (b.charging ? "⚡" : "");
                });
            }
        }
        setInterval(updateStats, 1000);

        // 2. Speech Engines
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = true; // Hamesha sunne ke liye
        recognition.lang = 'en-US';

        const synth = window.speechSynthesis;

        function speak(text) {
            const utter = new SpeechSynthesisUtterance(text);
            utter.pitch = 1.2;
            utter.rate = 1;
            synth.speak(utter);
        }

        // 3. System Initialization
        function initSystem() {
            document.getElementById('start-overlay').style.display = 'none';
            speak("Mivi System Online. Say my name to activate.");
            recognition.start();
        }

        recognition.onresult = (event) => {
            const last = event.results.length - 1;
            const command = event.results[last][0].transcript.toLowerCase();
            
            console.log("Heard:", command);

            // Wake Word Logic
            if (command.includes("mivi")) {
                statusMsg.innerText = "MIVI: ACTIVE & LISTENING";
                brain.classList.add('listening');
                
                if(command.includes("time")) {
                    speak("Current time in India is " + timeEl.innerText);
                } 
                else if(command.includes("battery") || command.includes("percent")) {
                    speak("System power is at " + battEl.innerText);
                }
                else if(command.includes("hello") || command.includes("hey")) {
                    speak("Hello Aryan. Systems are operational. How can I help?");
                }
                else if(command.includes("who are you")) {
                    speak("I am Mivi, a robotic AI created by Aryan AI Studio.");
                }
                
                // Reset visual after 3 seconds
                setTimeout(() => {
                    brain.classList.remove('listening');
                    statusMsg.innerText = "MIVI: STANDBY (SAY NAME)";
                }, 4000);
            }
        };

        // Restart recognition if it stops
        recognition.onend = () => recognition.start();

    </script>
</body>
</html>
